<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Security - Password Strength Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>🔐 Password Strength Checker</h2>
        <input type="password" id="password" placeholder="Enter Password">
        
        <div class="progress">
            <div class="bar" id="bar"></div>
        </div>
        
        <div id="result"></div>
        
        <ul>
            <li id="length">❌ Minimum 8 Characters</li>
            <li id="upper">❌ Uppercase Letter</li>
            <li id="lower">❌ Lowercase Letter</li>
            <li id="number">❌ Number</li>
            <li id="special">❌ Special Character</li>
        </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
